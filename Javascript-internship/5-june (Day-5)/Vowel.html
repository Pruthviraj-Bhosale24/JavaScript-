<!DOCTYPE html>
<html>
<head>
    <title>Vowel Check</title>
</head>
<body>
<script>
    var ch = prompt("Enter Character");

    switch(ch)
    {
        case 'a':
        case 'e':
        case 'i':
        case 'o':
        case 'u':
        case 'A':
        case 'E':
        case 'I':
        case 'O':
        case 'U':
            document.write("<h1>Vowel</h1>");
            break;

        default:
            document.write("<h1>Consonant</h1>");
    }
</script>
</body>
</html>
