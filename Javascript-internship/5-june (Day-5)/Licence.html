<!DOCTYPE html>
<html>
<head>
    <title>Driving License</title>
</head>
<body>
<script>
    var age = Number(prompt("Enter Age"));
    var test = prompt("Passed Driving Test? (yes/no)");

    if(age >= 18 && test=="yes")
        document.write("<h1>Eligible for Driving License</h1>");
    else
        document.write("<h1>Not Eligible</h1>");
</script>
</body>
</html>
