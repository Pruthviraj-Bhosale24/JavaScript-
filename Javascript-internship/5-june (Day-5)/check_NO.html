<!DOCTYPE html>
<html>
<head>
    <title>Positive Negative Zero</title>
</head>
<body>
<script>
    var num = Number(prompt("Enter Number"));

    if(num > 0)
        document.write("Positive");

    else if(num < 0)
        document.write("Negative");
    
    else
        document.write("Zero");
    
</script>
</body>
</html>
