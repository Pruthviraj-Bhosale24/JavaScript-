<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var num1=Number(prompt("Enter one Number:"))
        var num2=Number(prompt("enter second number:"))

        var ch=Number(prompt("***Operations:*** \n1:Addition \n2:Subtraction:\n3:Mutiplication\n4:Division"));
        switch(ch){
            case 1:
                document.write("<h1> Addition is:"+(num1+num2)+"</h1>");
                break;
            
            case 2:
                 document.write("<h1> Subtraction is:"+(num1-num2)+"</h1>");
                 break;
                
            case 3:
                 document.write("<h1> Multiplicatio is:"+(num1*num2)+"</h1>");
                 break;
                
            case 4:
                document.write("<h1> Division  is:"+(num1/num2)+"</h1>");
                break;

            default:
                document.write("<h1>Invalid Choice!!  Try Again!!</h1>");
                 
        }
    </script>
</body>
</html>
