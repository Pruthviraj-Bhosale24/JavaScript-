<!DOCTYPE html>
<html>
<head>
    <title>Positive and Even</title>
</head>
<body>
<script>
    var num =Number(prompt("Enter Number"));

    if(num > 0 && num % 2 == 0)
        document.write("<h1>Positive and Even</h1>");
    else
        document.write("<h1>Condition Not Satisfied!!!</h1>");
</script>
</body>
</html>
