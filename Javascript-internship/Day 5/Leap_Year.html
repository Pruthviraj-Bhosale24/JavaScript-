<!DOCTYPE html>
<html>
<head>
    <title>Leap Year</title>
</head>
<body>
<script>
    var year = parseInt(prompt("Enter Year"));

    if(year % 4 == 0)
    {
        document.write("<h1>Leap Year</h1>");
    }
    else
    {
        document.write("<h1>Not a Leap Year</h1>");
    }
</script>
</body>
</html>
