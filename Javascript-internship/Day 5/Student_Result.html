<!DOCTYPE html>
<html>
<head>
    <title>Pass All Subjects</title>
</head>
<body>
<script>
    var m1 = Number(prompt("Enter Marks of Subject 1"));
    var m2 = Number(prompt("Enter Marks of Subject 2"));
    var m3 = Number(prompt("Enter Marks of Subject 3"));

    if(m1>=35 && m2>=35 && m3>=35)
        document.write("<h1>Passed All Subjects</h1>");
    else
        document.write("<h1>Failed</h1>");
</script>
</body>
</html>
