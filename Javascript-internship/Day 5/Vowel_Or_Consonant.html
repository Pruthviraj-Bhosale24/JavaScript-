<!DOCTYPE html>
<html>
<head>
    <title>Vowel Consonant</title>
</head>
<body>
<script>
    var ch = prompt("Enter Character");

    if(ch=='a'||ch=='e'||ch=='i'||ch=='o'||ch=='u'||
       ch=='A'||ch=='E'||ch=='I'||ch=='O'||ch=='U')
    {
        document.write("<h1>Vowel</h1>");
    }
    else
    {
        document.write("<h1>Consonant</h1>");
    }
</script>
</body>
</html>
