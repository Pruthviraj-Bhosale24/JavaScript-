<!DOCTYPE html>
<html>
<head>
    <title>Age Group</title>
</head>
<body>
<script>
    var age = parseInt(prompt("Enter Age"));

    if(age <= 12)
        document.write("<h1>Child</h1>");
    else if(age <= 19)
        document.write("<h1>Teen</h1>");
    else if(age <= 59)
        document.write("<h1>Adult</h1>");
    else
        document.write("<h1>Senior</h1>");
</script>
</body>
</html>
