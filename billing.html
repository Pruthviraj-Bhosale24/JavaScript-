<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

<body>
    <h1>Billing System  </h1>
    <script>
        var unit = Number(prompt("Enter units"))
        var bill=0;
        if(unit <=100)
    {
        bill= unit * 2;
    }
    else if( unit <=200){
        bill=200 + ((unit - 100) * 3);
    }
    else{
        bill=500 + ((unit - 200) * 5);
    }
    console.log("Units:",unit);
    
    console.log("Bill:",bill);
    
    </script>
</body>
</html>
